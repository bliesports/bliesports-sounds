<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bli Sounds | E-Spor Müzik Platformu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* oyuncu hissi, kullanıcı seçimini engelle */
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #030507);
            font-family: 'Poppins', 'Orbitron', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            min-height: 100vh;
            color: #eef5ff;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* neon glow efekti */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 20%, rgba(0, 255, 170, 0.05), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ana container */
        .app-container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(2px);
        }

        /* header - gaming tarzı */
        .gaming-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 15px 25px;
            background: rgba(10, 20, 28, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            margin-bottom: 45px;
            border: 1px solid rgba(0, 255, 200, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5), 0 0 12px rgba(0,255,180,0.2);
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #aaffdd, #0aff9e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px #0aff9e80;
        }
        .logo span {
            font-size: 0.8rem;
            color: #4affb5;
            letter-spacing: 1px;
        }

        /* ana navigasyon menüsü (sekme) */
        .nav-tabs {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }
        .tab-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            font-weight: 600;
            font-family: 'Orbitron', monospace;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            color: #ccddee;
            transition: all 0.2s ease;
            letter-spacing: 1px;
            backdrop-filter: blur(2px);
        }
        .tab-btn.active {
            background: #0aff9e20;
            color: #0effb0;
            box-shadow: 0 0 8px #0aff9e;
            border: 1px solid #0aff9e;
            text-shadow: 0 0 3px #0aff9e;
        }
        .tab-btn:hover:not(.active) {
            color: #aaffdd;
            background: #ffffff10;
            transform: scale(1.02);
        }

        /* sayfa geçiş animasyonu */
        .page-view {
            animation: fadeSlideUp 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* kart stilleri - oyuncu */
        .game-cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
        }
        .game-card {
            background: linear-gradient(145deg, #11161f, #070b10);
            border-radius: 36px;
            padding: 30px 40px;
            width: 280px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid #2affaa30;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
        }
        .game-card:hover {
            transform: translateY(-8px);
            border-color: #0affb0;
            box-shadow: 0 0 22px #0aff9e40;
        }
        .game-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f0f0, #8effc0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .game-card p {
            margin-top: 15px;
            color: #aaddff;
            font-weight: 500;
        }

        /* müzik listesi */
        .music-list {
            background: rgba(12, 18, 28, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 25px;
            border: 1px solid #2effae30;
            margin-top: 20px;
        }
        .music-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            background: #0a101c80;
            margin-bottom: 20px;
            padding: 15px 25px;
            border-radius: 60px;
            border-left: 5px solid #0aff9e;
            transition: 0.1s;
        }
        .music-info {
            flex: 3;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            flex: 5;
        }
        .play-pause {
            background: #0aff9e20;
            border: 1px solid #0aff9e;
            color: #0aff9e;
            font-size: 1.3rem;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
            min-width: 95px;
        }
        .play-pause:hover {
            background: #0aff9e;
            color: #0a0f1a;
            box-shadow: 0 0 12px #0aff9e;
        }
        .progress-wrapper {
            flex: 2;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        input[type="range"] {
            flex: 1;
            height: 5px;
            -webkit-appearance: none;
            background: #2c3e40;
            border-radius: 10px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: #0aff9e;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px #0aff9e;
        }
        .time {
            font-family: monospace;
            font-size: 0.8rem;
            background: #00000060;
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* fydel özel player */
        .hero-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(125deg, #0b1120, #04070e);
            border-radius: 64px;
            padding: 45px 30px;
            margin: 30px 0;
            border: 1px solid cyan;
            box-shadow: 0 20px 35px #00000055;
        }
        .big-play {
            width: 110px;
            height: 110px;
            border-radius: 60px;
            background: #0aff9e20;
            border: 2px solid #0aff9e;
            font-size: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 35px;
            backdrop-filter: blur(5px);
        }
        .big-play:hover {
            background: #0aff9e;
            color: #010101;
            transform: scale(1.05);
            box-shadow: 0 0 28px #0aff9e;
        }
        .song-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 20px;
        }
        .progress-bar-big {
            width: 80%;
            margin: 20px 0;
        }

        /* modal - özel zyga */
        .modal-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-message.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: #0a0f1c;
            border-radius: 48px;
            padding: 35px 55px;
            text-align: center;
            border: 2px solid #ff44aa;
            box-shadow: 0 0 40px #ff44aa70;
            font-family: 'Orbitron', monospace;
        }
        .modal-content p {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff88cc;
        }
        .close-modal {
            margin-top: 30px;
            background: #ff44aa30;
            border: 1px solid #ff44aa;
            padding: 8px 25px;
            border-radius: 40px;
            cursor: pointer;
            color: white;
        }

        /* responsive */
        @media (max-width: 700px) {
            .gaming-header {
                flex-direction: column;
                gap: 18px;
                border-radius: 40px;
            }
            .music-item {
                flex-direction: column;
                align-items: stretch;
            }
            .controls {
                justify-content: space-between;
            }
        }

        button {
            background: none;
            border: none;
            font-family: inherit;
        }

        .back-button {
            background: rgba(255,255,255,0.05);
            border: 1px solid #2affae;
            padding: 8px 18px;
            border-radius: 30px;
            color: #0aff9e;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .back-button:hover {
            background: #0aff9e30;
        }
        .submenu {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }
        .choice-btn {
            background: #11161f;
            border: 1px solid cyan;
            padding: 12px 32px;
            border-radius: 48px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        .choice-btn:hover {
            background: cyan;
            color: black;
        }

        .info-placeholder {
            text-align: center;
            padding: 80px 20px;
            font-size: 1.4rem;
            color: #aaffdd;
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <!-- header dinamik olarak root içinde, ama sabit tutmak için yapılandıralım -->
</div>

<script>
    // ------------------------- MÜZİK VERİLERİ (demo) -------------------------
    // Gold Gun şarkıları
    const goldGunSongs = [
        { name: "Gold Gun - Main Theme", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
        { name: "Gold Gun - Combat Rage", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
        { name: "Gold Gun - Victory Lobby", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
    ];
    // Fydel özel müzik
    const fydelSong = { name: "FYDEL - Dark Requiem", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" };

    // Audio controller yönetimi: aktif oynatıcıyı takip et
    let currentAudio = null;
    let currentProgressInterval = null;
    let activeTrackElement = null;   // DOM referansı

    function stopAllSounds() {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
        }
        if (currentProgressInterval) {
            clearInterval(currentProgressInterval);
            currentProgressInterval = null;
        }
        // butonları 'Play' yap
        document.querySelectorAll('.play-pause').forEach(btn => {
            if (btn.innerText !== 'Play') btn.innerText = 'Play';
        });
        // büyük player varsa iconu ▶️ yap
        const bigPlayIcon = document.getElementById('bigPlayIcon');
        if (bigPlayIcon) bigPlayIcon.innerText = '▶️';
        const bigProgress = document.getElementById('bigProgress');
        if(bigProgress) bigProgress.value = 0;
        const bigCurrent = document.getElementById('bigCurrentTime');
        if(bigCurrent) bigCurrent.innerText = '0:00';
    }

    function formatTime(seconds) {
        if(isNaN(seconds)) return "0:00";
        let mins = Math.floor(seconds / 60);
        let secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function bindProgress(audioElement, progressSlider, timeLabel, isBig = false) {
        if (currentProgressInterval) clearInterval(currentProgressInterval);
        if (!audioElement) return;
        const update = () => {
            if (audioElement && !isNaN(audioElement.duration)) {
                if (progressSlider) progressSlider.value = (audioElement.currentTime / audioElement.duration) * 100 || 0;
                if (timeLabel) timeLabel.innerText = formatTime(audioElement.currentTime);
            }
        };
        update();
        currentProgressInterval = setInterval(() => {
            if (audioElement && !audioElement.paused && audioElement.currentTime) update();
            else if (audioElement && audioElement.paused) {}
            if (audioElement && audioElement.ended) {
                // şarkı bittiğinde butonları sıfırla
                if(activeTrackElement) activeTrackElement.innerText = 'Play';
                if (isBig) {
                    const bigBtn = document.getElementById('bigPlayIcon');
                    if(bigBtn) bigBtn.innerText = '▶️';
                }
                if(currentProgressInterval) clearInterval(currentProgressInterval);
                currentProgressInterval = null;
                currentAudio = null;
                activeTrackElement = null;
            }
        }, 200);
    }

    function setupTrack(audio, playBtn, progressSlider, timeSpan, onDestroy) {
        playBtn.onclick = () => {
            if (currentAudio && currentAudio !== audio) {
                stopAllSounds();
            }
            if (audio.paused) {
                audio.play().catch(e => console.log("play err", e));
                playBtn.innerText = 'Pause';
                activeTrackElement = playBtn;
                currentAudio = audio;
                bindProgress(audio, progressSlider, timeSpan);
            } else {
                audio.pause();
                playBtn.innerText = 'Play';
                if (currentProgressInterval) clearInterval(currentProgressInterval);
                currentProgressInterval = null;
            }
        };
        audio.addEventListener('ended', () => {
            playBtn.innerText = 'Play';
            if(currentAudio === audio) currentAudio = null;
            if(currentProgressInterval) clearInterval(currentProgressInterval);
            currentProgressInterval = null;
        });
        progressSlider.addEventListener('input', (e) => {
            if (audio.duration) {
                audio.currentTime = (e.target.value / 100) * audio.duration;
            }
        });
    }

    // ---------- SAYFA YÖNLENDİRME SİMÜLASYONU (History API) ----------
    const routes = {
        '/': 'home',
        '/site-musics': 'siteMusics',
        '/game-musics': 'gameMusics',
        '/game-musics/gold-gun': 'goldGun',
        '/game-musics/a-strange-man': 'aStrangeMan',
        '/game-musics/a-strange-man/fydel': 'fydelPage'
    };

    let currentPath = '/';

    function navigateTo(path, addToHistory = true) {
        if (currentPath === path) return;
        currentPath = path;
        if (addToHistory) {
            window.history.pushState({ path }, '', path);
        }
        renderPageByPath(path);
    }

    function renderPageByPath(path) {
        const appContainer = document.getElementById('appRoot');
        const headerHtml = `
            <div class="gaming-header">
                <div class="logo">
                    <h1>🔊 BLIE SOUNDS</h1>
                    <span>ESPORTS AUDIO HUB</span>
                </div>
                <div class="nav-tabs">
                    <button class="tab-btn ${path === '/' || path.startsWith('/game-musics') ? 'active' : ''}" data-nav="game">🎮 Oyun Müzikleri</button>
                    <button class="tab-btn ${path === '/site-musics' ? 'active' : ''}" data-nav="site">🌐 Site Müzikleri</button>
                </div>
            </div>
            <div class="page-view" id="dynamicPage"></div>
        `;
        appContainer.innerHTML = headerHtml;
        const dynamicDiv = document.getElementById('dynamicPage');
        // sayfa içerik üretimi
        if (path === '/') {
            dynamicDiv.innerHTML = `<div class="game-cards">
                <div class="game-card" data-game="a-strange-man"><h2>A STRANGE MAN<br>OYUN SERİSİ</h2><p>🎧 Karanlık epik müzikler</p></div>
                <div class="game-card" data-game="gold-gun"><h2>GOLD GUN</h2><p>🔫 Aksiyon & Western</p></div>
            </div>`;
            dynamicDiv.querySelectorAll('.game-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const game = card.getAttribute('data-game');
                    if (game === 'a-strange-man') navigateTo('/game-musics/a-strange-man');
                    else navigateTo('/game-musics/gold-gun');
                });
            });
        }
        else if (path === '/site-musics') {
            dynamicDiv.innerHTML = `<div class="info-placeholder">🎵 Site Müzikleri Bölümü Yakında! <br> ⚡ E-spor ritimleri hazırlanıyor.</div>`;
        }
        else if (path === '/game-musics') {
            dynamicDiv.innerHTML = `<div><button class="back-button" id="backHomeBtn">◀ Ana Sayfa</button>
            <div class="game-cards">
                <div class="game-card" data-game="a-strange-man"><h2>A STRANGE MAN</h2><p>Serüven evreni</p></div>
                <div class="game-card" data-game="gold-gun"><h2>GOLD GUN</h2><p>Vahşi batı nişancı</p></div>
            </div></div>`;
            dynamicDiv.querySelectorAll('.game-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const game = card.getAttribute('data-game');
                    if (game === 'a-strange-man') navigateTo('/game-musics/a-strange-man');
                    else navigateTo('/game-musics/gold-gun');
                });
            });
            document.getElementById('backHomeBtn')?.addEventListener('click', () => navigateTo('/'));
        }
        else if (path === '/game-musics/gold-gun') {
            let songsHtml = `<div><button class="back-button" id="backGameMusic">◀ Geri</button>
            <h2 style="margin:20px 0 10px">🔫 GOLD GUN Müzikleri</h2>
            <div class="music-list" id="goldGunList"></div></div>`;
            dynamicDiv.innerHTML = songsHtml;
            const listDiv = dynamicDiv.querySelector('#goldGunList');
            goldGunSongs.forEach((song, idx) => {
                const item = document.createElement('div');
                item.className = 'music-item';
                item.innerHTML = `
                    <div class="music-info">🎵 ${song.name}</div>
                    <div class="controls">
                        <button class="play-pause">Play</button>
                        <div class="progress-wrapper">
                            <input type="range" value="0" step="1" class="progress-slider">
                            <span class="time">0:00</span>
                        </div>
                    </div>
                `;
                const audio = new Audio(song.src);
                const playBtn = item.querySelector('.play-pause');
                const slider = item.querySelector('.progress-slider');
                const timeSpan = item.querySelector('.time');
                setupTrack(audio, playBtn, slider, timeSpan);
                listDiv.appendChild(item);
            });
            document.getElementById('backGameMusic')?.addEventListener('click', () => navigateTo('/game-musics'));
        }
        else if (path === '/game-musics/a-strange-man') {
            dynamicDiv.innerHTML = `<div><button class="back-button" id="backASM">◀ Geri</button>
            <h2>A STRANGE MAN • Seçim</h2>
            <div class="submenu">
                <button class="choice-btn" id="fydelBtn">FYDEL</button>
                <button class="choice-btn" id="zygaBtn">ZYGA</button>
            </div></div>`;
            document.getElementById('fydelBtn')?.addEventListener('click', () => navigateTo('/game-musics/a-strange-man/fydel'));
            document.getElementById('zygaBtn')?.addEventListener('click', () => {
                const modal = document.createElement('div');
                modal.className = 'modal-message active';
                modal.innerHTML = `<div class="modal-content"><p>⚠️ Şu anda bu özellik kullanılamıyor ⚠️</p><button class="close-modal">Kapat</button></div>`;
                document.body.appendChild(modal);
                modal.querySelector('.close-modal').addEventListener('click', () => modal.remove());
            });
            document.getElementById('backASM')?.addEventListener('click', () => navigateTo('/game-musics'));
        }
        else if (path === '/game-musics/a-strange-man/fydel') {
            dynamicDiv.innerHTML = `<div><button class="back-button" id="backFydel">◀ Geri</button>
            <div class="hero-player">
                <div class="big-play" id="bigPlayBtn"><span id="bigPlayIcon">▶️</span></div>
                <div class="song-title">🎧 FYDEL • ${fydelSong.name}</div>
                <div class="progress-bar-big" style="width:80%">
                    <input type="range" id="bigProgress" value="0" step="1" style="width:100%">
                    <div style="display:flex; justify-content:space-between; margin-top:8px"><span id="bigCurrent">0:00</span><span id="bigDuration">0:00</span></div>
                </div>
            </div></div>`;
            const audioBig = new Audio(fydelSong.src);
            const bigPlayDiv = document.getElementById('bigPlayBtn');
            const bigIcon = document.getElementById('bigPlayIcon');
            const bigSlider = document.getElementById('bigProgress');
            const bigCurrentSpan = document.getElementById('bigCurrent');
            const bigDurationSpan = document.getElementById('bigDuration');
            audioBig.addEventListener('loadedmetadata', () => {
                bigDurationSpan.innerText = formatTime(audioBig.duration);
            });
            function updateBigProgress() {
                if (audioBig.duration) {
                    bigSlider.value = (audioBig.currentTime / audioBig.duration) * 100;
                    bigCurrentSpan.innerText = formatTime(audioBig.currentTime);
                }
            }
            bigPlayDiv.onclick = () => {
                if (currentAudio && currentAudio !== audioBig) stopAllSounds();
                if (audioBig.paused) {
                    audioBig.play();
                    bigIcon.innerText = '⏸️';
                    currentAudio = audioBig;
                    activeTrackElement = null;
                    if (currentProgressInterval) clearInterval(currentProgressInterval);
                    currentProgressInterval = setInterval(() => {
                        if (!audioBig.paused) updateBigProgress();
                        if (audioBig.ended) {
                            bigIcon.innerText = '▶️';
                            clearInterval(currentProgressInterval);
                            currentAudio = null;
                        }
                    }, 200);
                } else {
                    audioBig.pause();
                    bigIcon.innerText = '▶️';
                    if(currentProgressInterval) clearInterval(currentProgressInterval);
                    currentProgressInterval = null;
                }
            };
            bigSlider.addEventListener('input', (e) => {
                if (audioBig.duration) audioBig.currentTime = (e.target.value / 100) * audioBig.duration;
                updateBigProgress();
            });
            audioBig.addEventListener('ended', () => {
                bigIcon.innerText = '▶️';
                if(currentProgressInterval) clearInterval(currentProgressInterval);
                currentProgressInterval = null;
                currentAudio = null;
            });
            document.getElementById('backFydel')?.addEventListener('click', () => navigateTo('/game-musics/a-strange-man'));
        }
        else {
            dynamicDiv.innerHTML = `<div class="info-placeholder">404 | Sayfa bulunamadı.<button class="back-button" style="margin-top:20px" id="goHome">Ana Sayfa</button></div>`;
            document.getElementById('goHome')?.addEventListener('click', () => navigateTo('/'));
        }

        // Yeniden header butonlarına event bağla
        const gameTab = document.querySelector('[data-nav="game"]');
        const siteTab = document.querySelector('[data-nav="site"]');
        if (gameTab) gameTab.addEventListener('click', () => navigateTo('/game-musics'));
        if (siteTab) siteTab.addEventListener('click', () => navigateTo('/site-musics'));
        // eğer aktif path game-musics altındaysa active classını güncelle
        if(path === '/site-musics') {
            siteTab?.classList.add('active');
            gameTab?.classList.remove('active');
        } else {
            gameTab?.classList.add('active');
            siteTab?.classList.remove('active');
        }
    }

    // popstate ile geri/ileri yönetimi
    window.addEventListener('popstate', (event) => {
        const path = window.location.pathname;
        if (routes.hasOwnProperty(path) || path === '/' || path === '/game-musics' || path === '/site-musics' || path === '/game-musics/gold-gun' || path === '/game-musics/a-strange-man' || path === '/game-musics/a-strange-man/fydel') {
            currentPath = path;
            renderPageByPath(path);
        } else {
            navigateTo('/', false);
        }
    });

    // başlangıç: kök dizini kontrol et
    let startPath = window.location.pathname;
    if (!routes.hasOwnProperty(startPath) && startPath !== '/' && !startPath.includes('/game-musics')) startPath = '/';
    navigateTo(startPath, false);
</script>
</body>
</html>
